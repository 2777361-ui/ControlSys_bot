<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Классные руководители</title>
    <style>body{font-family:system-ui,sans-serif;margin:1rem;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #ccc;padding:0.4rem 0.6rem;text-align:left;} th{background:#1565c0;color:#fff;}</style>
</head>
<body>
<h1>Классные руководители</h1>
<p>Дата выгрузки: {{ export_date }}</p>
<table>
    <thead><tr><th>Класс</th><th>Классный руководитель</th></tr></thead>
    <tbody>
    {% for a in assignments %}
    <tr>
        <td>{{ a.class_grade|class_grade_display }}</td>
        <td>{{ a.teacher_name or "— Не назначен —" }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
</body>
</html>
