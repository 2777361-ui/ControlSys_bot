{% extends "base.html" %}
{% block title %}Новый пароль — Школьная система{% endblock %}
{% block content %}
<h1>Задать новый пароль</h1>
{% if error %}
<p class="error">{{ error }}</p>
<p><a href="/forgot-password">Запросить ссылку заново</a> или <a href="/login">войти</a>.</p>
{% else %}
<form method="post" action="/reset-password">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="form-row">
        <label for="password">Новый пароль</label>
        <input type="password" id="password" name="password" required minlength="4" placeholder="Не менее 4 символов">
    </div>
    <div class="form-row">
        <label for="password2">Повторите пароль</label>
        <input type="password" id="password2" name="password2" required minlength="4">
    </div>
    <button type="submit" class="btn btn-primary">Сохранить пароль</button>
</form>
{% endif %}
{% endblock %}
