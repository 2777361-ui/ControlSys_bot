{% extends "base.html" %}
{% block title %}Внести списание — {{ student.full_name }}{% endblock %}
{% block content %}
<h1>Внести списание с баланса ученика</h1>
<p><a href="/my-class">← Мой класс</a> | <a href="/students">Список учеников</a></p>
<p><strong>Ученик:</strong> {{ student.full_name }} ({{ student.class_grade|class_grade_display }})</p>
<form method="post" action="/student-charge/add">
    <input type="hidden" name="student_id" value="{{ student.id }}">
    <div class="form-row">
        <label for="purpose_code">Назначение (продленка, расходники и т.д.)</label>
        <select id="purpose_code" name="purpose_code" required>
            {% for p in purposes %}
            <option value="{{ p.code }}">{{ p.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-row">
        <label for="amount">Сумма (₽)</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required placeholder="0.00">
    </div>
    <div class="form-row">
        <label for="charge_date">Дата списания</label>
        <input type="date" id="charge_date" name="charge_date" value="{{ today }}" required>
    </div>
    <div class="form-row">
        <label for="description">Комментарий (необязательно)</label>
        <input type="text" id="description" name="description" placeholder="Например: продленка за октябрь">
    </div>
    <button type="submit" class="btn btn-primary">Внести списание</button>
    <a href="/my-class" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
