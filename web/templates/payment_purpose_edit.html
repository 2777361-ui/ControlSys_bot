{% extends "base.html" %}
{% block title %}Изменить назначение — Школьная система{% endblock %}
{% block content %}
<h1>Изменить назначение</h1>
<p><a href="/payment-purposes">← К списку назначений</a></p>
<form method="post" action="/payment-purposes/{{ purpose.id }}/edit">
    <input type="hidden" name="code" value="{{ purpose.code }}">
    <div class="form-row">
        <label for="name">Название (как показывается в форме и отчётах)</label>
        <input type="text" id="name" name="name" value="{{ purpose.name }}" required>
    </div>
    <div class="form-row">
        <label for="price">Цена по умолчанию (₽)</label>
        <input type="number" id="price" name="price" step="0.01" min="0" value="{{ purpose.get('price', 0) or 0 }}">
        <span class="hint">Для обучения — сумма начисления за месяц; для остальных — по внесению.</span>
    </div>
    <div class="form-row">
        <label for="charge_frequency">Тип начисления</label>
        <select id="charge_frequency" name="charge_frequency">
            <option value="manual" {% if (purpose.get('charge_frequency') or 'manual') == 'manual' %}selected{% endif %}>По внесению (ручное)</option>
            <option value="monthly" {% if purpose.get('charge_frequency') == 'monthly' %}selected{% endif %}>Ежемесячно (1-го числа)</option>
            <option value="daily" {% if purpose.get('charge_frequency') == 'daily' %}selected{% endif %}>Ежедневно</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/payment-purposes" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
